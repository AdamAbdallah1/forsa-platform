<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Branding & Theme -->
    <title>Forsa Digital — Find Work & Hire Talent in Lebanon</title>
    <meta name="application-name" content="Forsa" />
    <meta name="apple-mobile-web-app-title" content="Forsa" />
    <meta name="theme-color" content="#6D28D9" />
    <meta name="author" content="Forsa Digital" />

    <!-- Search Engine Directives -->
    <meta name="description" content="Forsa Digital helps students, freelancers, creators, and businesses in Lebanon find work, hire talent, and manage applications without WhatsApp or group chaos." />
    <meta name="keywords" content="Lebanon jobs, freelance Lebanon, internships Lebanon, hire talent Lebanon, student jobs Lebanon, Forsa Digital" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://forsa.digital/" />
    <link rel="icon" type="image/svg+xml" href="/forsa-logo.svg" />

    <!-- Geo-Targeting (Crucial for Local Lebanese Search Traffic) -->
    <meta name="language" content="English" />
    <meta name="geo.region" content="LB" />
    <meta name="geo.placename" content="Lebanon" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://forsa.digital/" />
    <meta property="og:title" content="Forsa Digital — Find Work & Hire Talent in Lebanon" />
    <meta property="og:description" content="A modern opportunity platform for Lebanese students, freelancers, creators, and businesses." />
    <meta property="og:image" content="https://forsa.digital/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://forsa.digital/" />
    <meta name="twitter:title" content="Forsa Digital — Find Work & Hire Talent in Lebanon" />
    <meta name="twitter:description" content="Find work. Hire talent. Manage applications without chaos." />
    <meta name="twitter:image" content="https://forsa.digital/og-image.png" />

    <!-- Advanced Rich Snippets JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Forsa Digital",
      "url": "https://forsa.digital",
      "description": "Forsa helps students, freelancers, creators, and businesses in Lebanon find work, hire talent, and manage applications.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "areaServed": {
        "@type": "Country",
        "name": "Lebanon"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Forsa Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Freelance & Job Board Lebanon"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Talent Recruitment Marketplace"
            }
          }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
